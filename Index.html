<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohd Kaif Khan — HVAC Engineer & Systems Specialist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ==================== TOKENS ==================== */
  :root {
    --midnight: #0A0C10;
    --graphite: #141720;
    --slate: #1E2230;
    --ice: #C8E6F5;
    --arctic: #7EC8E3;
    --flame: #FF5F1F;
    --mist: #8A9BB0;
    --white: #F0F4F8;
    --gold: #D4A843;

    --font-display: 'Syne', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  /* ==================== RESET ==================== */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; font-size: 16px; }

  body {
    background: var(--midnight);
    color: var(--white);
    font-family: var(--font-body);
    overflow-x: hidden;
    cursor: none;
  }

  /* ==================== CUSTOM CURSOR ==================== */
  .cursor {
    position: fixed;
    width: 12px; height: 12px;
    background: var(--arctic);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transition: transform 0.15s ease, background 0.2s;
    mix-blend-mode: screen;
  }
  .cursor-ring {
    position: fixed;
    width: 40px; height: 40px;
    border: 1px solid rgba(126,200,227,0.4);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transition: transform 0.4s cubic-bezier(0.23,1,0.32,1), opacity 0.3s;
  }
  body:hover .cursor-ring { opacity: 1; }

  /* ==================== NAV ==================== */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.5rem 4rem;
    transition: background 0.4s, backdrop-filter 0.4s;
  }
  nav.scrolled {
    background: rgba(10,12,16,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(126,200,227,0.08);
  }
  .nav-logo {
    font-family: var(--font-display);
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--white);
    text-decoration: none;
  }
  .nav-logo span { color: var(--arctic); }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; }
  .nav-links a {
    font-family: var(--font-mono);
    font-size: 0.78rem;
    color: var(--mist);
    text-decoration: none;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: color 0.2s;
    position: relative;
  }
  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 0;
    width: 0; height: 1px;
    background: var(--arctic);
    transition: width 0.3s;
  }
  .nav-links a:hover { color: var(--arctic); }
  .nav-links a:hover::after { width: 100%; }
  .nav-cta {
    font-family: var(--font-mono);
    font-size: 0.78rem;
    padding: 0.6rem 1.4rem;
    border: 1px solid var(--arctic);
    color: var(--arctic);
    text-decoration: none;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: background 0.2s, color 0.2s;
    border-radius: 2px;
  }
  .nav-cta:hover { background: var(--arctic); color: var(--midnight); }

  /* ==================== HERO ==================== */
  #hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 4rem;
    position: relative;
    overflow: hidden;
  }

  /* Animated background grid */
  .hero-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(126,200,227,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(126,200,227,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridPulse 8s ease-in-out infinite;
  }
  @keyframes gridPulse {
    0%,100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  /* Animated arc/duct graphic */
  .hero-svg {
    position: absolute;
    right: -100px;
    top: 50%;
    transform: translateY(-50%);
    width: 700px;
    opacity: 0.12;
    animation: rotateSlow 40s linear infinite;
  }
  @keyframes rotateSlow {
    from { transform: translateY(-50%) rotate(0deg); }
    to { transform: translateY(-50%) rotate(360deg); }
  }

  /* Glow blob */
  .hero-glow {
    position: absolute;
    right: 15%;
    top: 30%;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(126,200,227,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-flame-glow {
    position: absolute;
    left: 20%;
    bottom: 10%;
    width: 400px; height: 300px;
    background: radial-gradient(circle, rgba(255,95,31,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-eyebrow {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--arctic);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
    opacity: 0;
    animation: fadeUp 0.8s 0.3s forwards;
  }
  .hero-eyebrow::before {
    content: '';
    display: block;
    width: 40px; height: 1px;
    background: var(--arctic);
  }

  .hero-name {
    font-family: var(--font-display);
    font-size: clamp(3.5rem, 8vw, 7.5rem);
    font-weight: 800;
    line-height: 0.95;
    letter-spacing: -0.02em;
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeUp 0.8s 0.5s forwards;
  }
  .hero-name .line2 {
    color: transparent;
    -webkit-text-stroke: 1px rgba(200,230,245,0.35);
    display: block;
  }
  .hero-name .highlight { color: var(--arctic); }

  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(1rem, 2vw, 1.4rem);
    font-weight: 500;
    color: var(--mist);
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp 0.8s 0.7s forwards;
  }
  .hero-title span { color: var(--flame); }

  .hero-desc {
    max-width: 520px;
    font-size: 1rem;
    line-height: 1.75;
    color: rgba(240,244,248,0.6);
    margin-bottom: 3rem;
    opacity: 0;
    animation: fadeUp 0.8s 0.9s forwards;
  }

  .hero-actions {
    display: flex;
    gap: 1.2rem;
    align-items: center;
    opacity: 0;
    animation: fadeUp 0.8s 1.1s forwards;
  }
  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    background: var(--arctic);
    color: var(--midnight);
    font-family: var(--font-mono);
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    padding: 0.9rem 2rem;
    text-decoration: none;
    border-radius: 2px;
    text-transform: uppercase;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 30px rgba(126,200,227,0.2);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 40px rgba(126,200,227,0.35);
  }
  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    color: var(--white);
    font-family: var(--font-mono);
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    padding: 0.9rem 2rem;
    text-decoration: none;
    text-transform: uppercase;
    border: 1px solid rgba(240,244,248,0.15);
    border-radius: 2px;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-secondary:hover { border-color: var(--arctic); color: var(--arctic); }

  /* Stats bar */
  .hero-stats {
    position: absolute;
    bottom: 3rem;
    left: 4rem;
    right: 4rem;
    display: flex;
    gap: 4rem;
    border-top: 1px solid rgba(126,200,227,0.1);
    padding-top: 2rem;
    opacity: 0;
    animation: fadeUp 0.8s 1.3s forwards;
  }
  .stat-number {
    font-family: var(--font-display);
    font-size: 2rem;
    font-weight: 800;
    color: var(--white);
    line-height: 1;
  }
  .stat-number span { color: var(--arctic); }
  .stat-label {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--mist);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 0.3rem;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ==================== SCROLL INDICATOR ==================== */
  .scroll-indicator {
    position: absolute;
    right: 4rem;
    bottom: 3rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    opacity: 0;
    animation: fadeUp 0.8s 1.5s forwards;
  }
  .scroll-indicator span {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--mist);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    writing-mode: vertical-rl;
  }
  .scroll-line {
    width: 1px;
    height: 60px;
    background: linear-gradient(var(--arctic), transparent);
    animation: scrollDrop 2s ease-in-out infinite;
  }
  @keyframes scrollDrop {
    0% { transform: scaleY(0); transform-origin: top; }
    50% { transform: scaleY(1); transform-origin: top; }
    51% { transform: scaleY(1); transform-origin: bottom; }
    100% { transform: scaleY(0); transform-origin: bottom; }
  }

  /* ==================== SECTION COMMONS ==================== */
  section { padding: 8rem 4rem; }
  .section-eyebrow {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--arctic);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }
  .section-eyebrow::before {
    content: '';
    display: block;
    width: 30px; height: 1px;
    background: var(--arctic);
  }
  .section-heading {
    font-family: var(--font-display);
    font-size: clamp(2rem, 4vw, 3.5rem);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 1.5rem;
  }

  /* ==================== ABOUT ==================== */
  #about {
    background: var(--graphite);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6rem;
    align-items: center;
  }
  .about-visual {
    position: relative;
  }
  .about-img-wrapper {
    position: relative;
    border-radius: 4px;
    overflow: hidden;
  }
  .about-img-placeholder {
    width: 100%;
    aspect-ratio: 3/4;
    background: var(--slate);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  /* Animated HVAC blueprint illustration */
  .blueprint-canvas {
    width: 100%;
    height: 100%;
    position: absolute;
    inset: 0;
  }
  .about-badge {
    position: absolute;
    bottom: -1.5rem;
    right: -1.5rem;
    background: var(--flame);
    color: white;
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 0.8rem;
    padding: 1.5rem;
    border-radius: 50%;
    width: 110px; height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    line-height: 1.2;
    box-shadow: 0 0 40px rgba(255,95,31,0.3);
  }
  .about-corner-accent {
    position: absolute;
    top: -1rem; left: -1rem;
    width: 80px; height: 80px;
    border-top: 2px solid var(--arctic);
    border-left: 2px solid var(--arctic);
  }
  .about-text p {
    font-size: 1rem;
    line-height: 1.85;
    color: rgba(240,244,248,0.65);
    margin-bottom: 1.2rem;
  }
  .about-text p strong { color: var(--white); font-weight: 500; }
  .cert-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    margin-top: 2rem;
  }
  .chip {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.4rem 0.9rem;
    border: 1px solid rgba(126,200,227,0.3);
    color: var(--arctic);
    border-radius: 2px;
    letter-spacing: 0.08em;
    transition: background 0.2s, color 0.2s;
  }
  .chip:hover { background: rgba(126,200,227,0.1); }

  /* ==================== SERVICES ==================== */
  #services {
    background: var(--midnight);
  }
  .services-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 4rem;
  }
  .services-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5px;
    background: rgba(126,200,227,0.08);
    border: 1px solid rgba(126,200,227,0.08);
  }
  .service-card {
    background: var(--midnight);
    padding: 2.5rem;
    position: relative;
    overflow: hidden;
    transition: background 0.3s;
    cursor: default;
  }
  .service-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 2px;
    background: linear-gradient(90deg, var(--arctic), transparent);
    transform: scMohd Kaif(0);
    transform-origin: left;
    transition: transform 0.4s;
  }
  .service-card:hover { background: var(--graphite); }
  .service-card:hover::before { transform: scMohd Kaif(1); }
  .service-icon {
    width: 48px; height: 48px;
    margin-bottom: 1.5rem;
    color: var(--arctic);
  }
  .service-num {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: rgba(126,200,227,0.3);
    letter-spacing: 0.15em;
    margin-bottom: 1rem;
  }
  .service-card h3 {
    font-family: var(--font-display);
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 0.8rem;
    color: var(--white);
  }
  .service-card p {
    font-size: 0.88rem;
    line-height: 1.7;
    color: rgba(240,244,248,0.5);
  }

  /* ==================== EXPERIENCE TIMELINE ==================== */
  #experience {
    background: var(--graphite);
  }
  .timeline {
    position: relative;
    max-width: 900px;
    margin: 4rem auto 0;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: 180px;
    top: 0; bottom: 0;
    width: 1px;
    background: linear-gradient(var(--arctic), transparent);
    opacity: 0.2;
  }
  .timeline-item {
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: 3rem;
    margin-bottom: 4rem;
    position: relative;
    opacity: 0;
    transform: translateX(-20px);
    transition: opacity 0.6s, transform 0.6s;
  }
  .timeline-item.visible { opacity: 1; transform: translateX(0); }
  .timeline-item::after {
    content: '';
    position: absolute;
    left: 173px;
    top: 8px;
    width: 15px; height: 15px;
    border: 2px solid var(--arctic);
    background: var(--midnight);
    border-radius: 50%;
    box-shadow: 0 0 15px rgba(126,200,227,0.4);
  }
  .timeline-meta { text-align: right; padding-right: 2rem; }
  .timeline-year {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--arctic);
    font-weight: 500;
  }
  .timeline-company {
    font-size: 0.8rem;
    color: var(--mist);
    margin-top: 0.3rem;
  }
  .timeline-content h3 {
    font-family: var(--font-display);
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 0.6rem;
  }
  .timeline-content p {
    font-size: 0.88rem;
    line-height: 1.7;
    color: rgba(240,244,248,0.55);
    margin-bottom: 1rem;
  }
  .timeline-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }
  .tag {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    padding: 0.25rem 0.65rem;
    background: rgba(126,200,227,0.07);
    color: rgba(126,200,227,0.7);
    border-radius: 2px;
    letter-spacing: 0.05em;
  }

  /* ==================== SKILLS / EXPERTISE ==================== */
  #skills {
    background: var(--midnight);
  }
  .skills-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4rem;
    margin-top: 4rem;
  }
  .skill-category h4 {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--arctic);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }
  .skill-bar-item {
    margin-bottom: 1.2rem;
  }
  .skill-bar-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 0.5rem;
  }
  .skill-name {
    font-size: 0.85rem;
    color: var(--white);
  }
  .skill-pct {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--mist);
  }
  .skill-track {
    height: 3px;
    background: rgba(240,244,248,0.08);
    border-radius: 2px;
    overflow: hidden;
  }
  .skill-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--arctic), var(--ice));
    border-radius: 2px;
    width: 0%;
    transition: width 1.2s cubic-bezier(0.23,1,0.32,1);
  }
  .skill-fill.flame { background: linear-gradient(90deg, var(--flame), #FF9A5C); }

  /* Tools grid */
  .tools-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: rgba(126,200,227,0.06);
    border: 1px solid rgba(126,200,227,0.06);
    margin-top: 4rem;
  }
  .tool-item {
    background: var(--midnight);
    padding: 1.5rem;
    text-align: center;
    transition: background 0.2s;
  }
  .tool-item:hover { background: var(--graphite); }
  .tool-name {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--mist);
    letter-spacing: 0.06em;
  }
  .tool-icon {
    font-size: 1.8rem;
    margin-bottom: 0.6rem;
    display: block;
  }

  /* ==================== PROJECTS ==================== */
  #projects {
    background: var(--graphite);
  }
  .projects-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 3rem;
  }
  .projects-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
  }
  .project-card {
    background: var(--midnight);
    border: 1px solid rgba(126,200,227,0.06);
    border-radius: 4px;
    overflow: hidden;
    transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
    position: relative;
  }
  .project-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    border-color: rgba(126,200,227,0.2);
  }
  .project-thumb {
    height: 180px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 4rem;
  }
  .project-thumb.cool { background: linear-gradient(135deg, #0D2A38, #1A4A5E); }
  .project-thumb.heat { background: linear-gradient(135deg, #2A0A0A, #4E1A0A); }
  .project-thumb.smart { background: linear-gradient(135deg, #0A1A2A, #0A2A1A); }
  .project-thumb.vent { background: linear-gradient(135deg, #1A1A2A, #2A1A3A); }
  .project-thumb.comm { background: linear-gradient(135deg, #0A2A1A, #1A2A0A); }
  .project-thumb.energy { background: linear-gradient(135deg, #2A1A0A, #1A0A2A); }
  .project-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(10,12,16,0.6);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .project-card:hover .project-overlay { opacity: 1; }
  .project-body { padding: 1.5rem; }
  .project-category {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--arctic);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .project-body h3 {
    font-family: var(--font-display);
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 0.6rem;
  }
  .project-body p {
    font-size: 0.82rem;
    line-height: 1.65;
    color: rgba(240,244,248,0.5);
    margin-bottom: 1rem;
  }
  .project-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--mist);
    border-top: 1px solid rgba(126,200,227,0.06);
    padding-top: 0.8rem;
  }
  .project-impact { color: var(--gold); }

  /* ==================== TESTIMONIALS ==================== */
  #testimonials {
    background: var(--midnight);
  }
  .testimonials-track {
    overflow: hidden;
    margin-top: 3rem;
  }
  .testimonials-inner {
    display: flex;
    gap: 2rem;
